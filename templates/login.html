<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<!-- 🔵 REALISTIC GLOW SHIELD -->
<div class="bg-shield">
  <div class="shield-glow"></div>

  <svg viewBox="0 0 512 512">
    <path d="M256 32L96 96v144c0 112 80 192 160 224 80-32 160-112 160-224V96L256 32z"
          class="shield-body"/>

    <path d="M260 60 L245 150 L270 190" class="crack"/>
    <path d="M210 120 L240 210" class="crack"/>
    <path d="M310 130 L290 240" class="crack"/>
    <path d="M240 200 L260 300" class="crack"/>
  </svg>
</div>

<div class="auth-container">
  <div class="auth-card">

    <h1 class="logo">Secure Code Scanner</h1>
    <p class="subtitle">Sign in to your account</p>

    <form>
      <div class="input-group">
        <input type="email" name="email" required placeholder="Email">
      </div>

      <div class="input-group">
        <input type="password" name="password" required placeholder="Password">
      </div>

      <button class="btn-primary" type="submit">Sign In</button>
    </form>

    <p class="switch">
      Don’t have an account? 
      <a href="/signup">Create one</a>
    </p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
  authDomain: "code-scanner-91d48.firebaseapp.com",
  projectId: "code-scanner-91d48"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

document.querySelector("form").onsubmit = async (e) => {
  e.preventDefault();

  const email = document.querySelector("input[name=email]").value;
  const password = document.querySelector("input[name=password]").value;

  try {
    const userCred = await auth.signInWithEmailAndPassword(email, password);
    const token = await userCred.user.getIdToken();

    localStorage.setItem("token", token);
    window.location.href = "/scanner";
  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>
