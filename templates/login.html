<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Secure Code Scanner</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1 class="logo">Secure Code Scanner</h1>
      <p class="subtitle">Enter your credentials to access the vault</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" required placeholder="Email Address">
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" required placeholder="Password">
      </div>

      <button class="btn-primary" type="submit" id="submitBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div id="recaptcha-container"></div> <div class="auth-footer">
      <p>New operative? <a href="/signup">Request Access</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
  authDomain: "code-scanner-91d48.firebaseapp.com",
  projectId: "code-scanner-91d48"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Set Tenant ID for Multi-tenancy
auth.tenantId = "myTenantId1"; 

document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
  btn.disabled = true;

  try {
    const userCred = await auth.signInWithEmailAndPassword(email, password);
    const token = await userCred.user.getIdToken(true);
    localStorage.setItem("token", token);
    window.location.href = "/scanner";
  } catch (err) {
    if (err.code === 'auth/multi-factor-auth-required') {
      // MFA Logic
      const resolver = err.resolver;
      const hints = resolver.hints;
      
      // Initialize invisible ReCAPTCHA
      const recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
      });

      const phoneAuthProvider = new firebase.auth.PhoneAuthProvider();
      const phoneInfoOptions = {
        multiFactorHint: hints[0],
        session: resolver.session
      };

      try {
        const verificationId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, recaptchaVerifier);
        const verificationCode = prompt("Enter the MFA security code sent to your phone:");
        
        if (verificationCode) {
          const cred = firebase.auth.PhoneAuthProvider.credential(verificationId, verificationCode);
          const multiFactorAssertion = firebase.auth.PhoneMultiFactorGenerator.assertion(cred);
          const mfaUserCred = await resolver.resolveSignIn(multiFactorAssertion);
          
          const token = await mfaUserCred.user.getIdToken(true);
          localStorage.setItem("token", token);
          window.location.href = "/scanner";
        }
      } catch (mfaErr) {
        alert("MFA Verification Failed: " + mfaErr.message);
      }
    } else {
      alert("Authentication Failed: " + err.message);
    }
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
