<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Secure Code Scanner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form id="loginForm" style="display:flex; flex-direction:column; max-width:400px; margin:auto; padding:50px;">
            <h1>Sign In</h1>
            <input type="email" id="email" placeholder="Email" required style="margin-bottom:10px; padding:10px;">
            <input type="password" id="password" placeholder="Password" required style="margin-bottom:10px; padding:10px;">
            <button type="submit" id="submitBtn" style="padding:10px; background:green; color:white;">Sign In</button>
            <p><a href="/signup">Need an account? Sign up</a></p>
        </form>
        <div id="recaptcha-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
            authDomain: "code-scanner-91d48.firebaseapp.com",
            projectId: "code-scanner-91d48"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.tenantId = "Enterprise-Test-avvoo";

        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("submitBtn");

            btn.disabled = true;
            btn.innerText = "Authenticating...";

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const token = await userCred.user.getIdToken();
                localStorage.setItem("token", token);
                window.location.href = "/scanner";
            } catch (err) {
                alert("Login Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        };
    </script>
</body>
</html>
