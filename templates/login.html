<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Code Scanner</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #mfa-section { display: none; text-align:center; }
        .mfa-input { 
            width:100%; background:rgba(255,255,255,0.05); border:1px solid #333; 
            color:#00ff88; padding:12px; margin: 20px 0; text-align:center; font-size:1.8rem; letter-spacing:5px;
        }
    </style>
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div id="login-section">
            <div class="auth-header">
                <div class="auth-icon"><i class="fas fa-user-shield"></i></div>
                <h1 class="logo">Secure Code Scanner</h1>
                <p class="subtitle">Enter credentials to access the vault</p>
            </div>
            <form id="loginForm">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" required placeholder="Email Address"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" required placeholder="Password"></div>
                <div style="text-align:right; margin-bottom:20px;"><a href="#" id="forgotPasswordBtn" style="color:#888; font-size:0.8rem;">Forgot password?</a></div>
                <button class="btn-primary" type="submit" id="submitBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>
        </div>

        <div id="mfa-section">
            <div class="auth-header">
                <div class="auth-icon" style="color:#00ff88;"><i class="fas fa-key"></i></div>
                <h1 class="logo">Security Challenge</h1>
                <p class="subtitle">Enter the 6-digit code from your app</p>
            </div>
            <input type="text" id="login-mfa-code" class="mfa-input" placeholder="000000" maxlength="6">
            <button class="btn-primary" onclick="submitMFALogin()">Verify & Access</button>
        </div>

        <div class="auth-footer"><p>New operative? <a href="/signup">Request Access</a></p></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
        authDomain: "code-scanner-91d48.firebaseapp.com",
        projectId: "code-scanner-91d48"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    auth.tenantId = "Enterprise-Test-avvoo";

    let userEmail = "";

    document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");

        btn.innerHTML = "Verifying...";
        btn.disabled = true;

        try {
            await auth.signInWithEmailAndPassword(email, password);
            userEmail = email;

            // Check if MFA is enabled for this user on backend
            const mfaCheck = await fetch('/mfa/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email })
            });
            const mfaData = await mfaCheck.json();

            if (mfaData.enabled) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('mfa-section').style.display = 'block';
            } else {
                const token = await auth.currentUser.getIdToken(true);
                localStorage.setItem("token", token);
                window.location.href = "/scanner";
            }
        } catch (err) {
            alert(err.message);
            btn.innerHTML = "Sign In";
            btn.disabled = false;
        }
    };

    async function submitMFALogin() {
        const code = document.getElementById('login-mfa-code').value;
        const res = await fetch('/mfa/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: userEmail, code: code })
        });
        const data = await res.json();

        if (data.success) {
            const token = await auth.currentUser.getIdToken(true);
            localStorage.setItem("token", token);
            window.location.href = "/scanner";
        } else {
            alert("Security code invalid.");
        }
    }
</script>
</body>
</html>
