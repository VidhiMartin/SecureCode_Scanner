<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE CODE SCANNER | Advanced LLM Code Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="nav-header" style="position: absolute; top: 20px; right: 20px;">
        <button id="logoutBtn" class="btn-logout" style="cursor:pointer; padding:10px; color:red; border:1px solid red; background:none; border-radius:8px;">
            <i class="fas fa-power-off"></i> Terminate Session
        </button>
    </div>

    <div class="container" style="margin-top: 100px;">
        <div class="scanner-card">
            <form id="scanForm">
                <select name="language" id="language" style="width:100%; padding:10px; margin-bottom:10px;">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                </select>
                <textarea name="code" id="code" rows="14" style="width:100%;" placeholder="Paste code here..."></textarea>
                <button type="submit" id="submitBtn" style="width:100%; padding:15px; margin-top:10px; background:#00ff88; color:#000; font-weight:bold;">
                    Initialize Security Scan
                </button>
            </form>
        </div>

        <div id="result-card" style="display:none; margin-top:20px; background:#1e1e1e; padding:20px; border-radius:10px; color:#fff;">
            <h3>Audit Results</h3>
            <pre><code id="result" class="language-json"></code></pre>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "/login";
        }

        document.getElementById("logoutBtn").onclick = () => {
            localStorage.removeItem("token");
            window.location.href = "/login";
        };

        const scanForm = document.getElementById("scanForm");
        scanForm.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById("submitBtn");
            const token = localStorage.getItem("token");

            submitBtn.disabled = true;
            submitBtn.innerText = "Auditing...";

            try {
                const formData = new FormData(scanForm);
                const response = await fetch("/scan", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}` },
                    body: formData
                });

                const data = await response.json();
                document.getElementById("result").textContent = JSON.stringify(data, null, 2);
                Prism.highlightAll();
                document.getElementById("result-card").style.display = "block";
            } catch (err) {
                alert("Scan Failed: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Initialize Security Scan";
            }
        };
    </script>
</body>
</html>
