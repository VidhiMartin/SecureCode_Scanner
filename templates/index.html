<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE CODE SCANNER | Advanced LLM Code Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .nav-header { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout {
            background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 6px 14px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif;
            font-weight: 500; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px;
        }
        .btn-logout:hover { background: #ff4444; color: white; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); }
        #result-card { display: none; }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .error-text { color: #ff4444; font-family: 'Space Grotesk', monospace; font-weight: bold; }
        .error-subtext { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="auth-overlay"><i class="fas fa-shield-halved fa-spin" style="color:#00ff88; font-size:3rem;"></i></div>

    <div class="nav-header">
        <button id="logoutBtn" class="btn-logout"><i class="fas fa-power-off"></i> Terminate Session</button>
    </div>

    <div class="hero">
        <div class="container">
            <h1 class="headline">Secure Code Scanner</h1>
            <div class="floating-shield"><i class="fas fa-shield-halved"></i></div>
            <br>
            <div class="model-badge"><i class="fas fa-microchip"></i> <span>Powered by NVIDIA Nemotron-3 Super 120B</span></div>
            <p class="subhead">Enterprise-grade code security auditing powered by advanced LLM reasoning.</p>
        </div>
    </div>

    <div class="container">
        <div class="scanner-card">
            <form id="scanForm">
                <label for="language"><i class="fas fa-code-branch"></i> Environment Context</label>
                <select name="language" id="language">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="go">Go</option>
                </select>
                <label for="code"><i class="fas fa-terminal"></i> Source Code Input</label>
                <textarea name="code" id="code" rows="14" placeholder="// Paste source code here for auditing..."></textarea>
                <button type="submit" id="submitBtn"><i class="fas fa-shield-virus"></i> Initialize Security Scan</button>
            </form>
        </div>
        <div class="result-card" id="result-card">
            <div class="result-header"><i class="fas fa-search-nodes"></i> Audit Complete</div>
            <pre><code id="result" class="language-json"></code></pre>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs", authDomain: "code-scanner-91d48.firebaseapp.com", projectId: "code-scanner-91d48" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    auth.tenantId = "Enterprise-Test-avvoo"; 

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            setTimeout(() => { if (!auth.currentUser) window.location.href = "/login"; }, 1000);
        } else {
            const token = await user.getIdToken();
            localStorage.setItem("token", token);
            document.getElementById("auth-overlay").style.display = "none";
        }
    });

    document.getElementById("logoutBtn").onclick = () => {
        auth.signOut().then(() => { localStorage.removeItem("token"); window.location.href = "/login"; });
    };

    document.getElementById("scanForm").onsubmit = async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        if (!user) return window.location.href = "/login";
        
        const submitBtn = document.getElementById("submitBtn");
        const resultDisplay = document.getElementById("result");
        const resultCard = document.getElementById("result-card");

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';

        try {
            const token = await user.getIdToken(true);
            const formData = new FormData(e.target);
            const response = await fetch("/scan", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                // Enterprise Error Rendering
                resultDisplay.innerHTML = `
                    <span class="error-text">[!] ${data.error || 'AUDIT_FAILED'}</span><br>
                    <span class="error-subtext">${data.message || 'Verification rejected by server.'}</span>
                `;
            } else {
                resultDisplay.textContent = JSON.stringify(data, null, 2);
                Prism.highlightElement(resultDisplay);
            }
            
            resultCard.style.display = "block";
            resultCard.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            alert("Transmission Error: " + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-shield-virus"></i> Initialize Security Scan';
        }
    };
</script>
</body>
</html>
