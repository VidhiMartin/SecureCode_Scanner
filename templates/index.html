<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE CODE SCANNER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
<body>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
        authDomain: "code-scanner-91d48.firebaseapp.com",
        projectId: "code-scanner-91d48"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    auth.tenantId = "Enterprise-Test-avvoo";

    // FIX: Auth State Guard with initial check
    let isInitialLoad = true;

    auth.onAuthStateChanged(async (user) => {
        if (!user && !isInitialLoad) {
            window.location.href = "/login";
        } else if (user) {
            const token = await user.getIdToken();
            localStorage.setItem("token", token);
            document.body.style.display = "block"; // Only show body once authed
        }
        isInitialLoad = false;
    });

    // Logout Logic
    document.getElementById("logoutBtn").onclick = () => {
        auth.signOut().then(() => {
            localStorage.removeItem("token");
            window.location.href = "/login";
        });
    };

    const scanForm = document.getElementById("scanForm");
    scanForm.onsubmit = async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        if (!user) return window.location.href = "/login";

        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerText = "Analyzing...";

        try {
            const token = await user.getIdToken(true);
            const formData = new FormData(scanForm);

            const response = await fetch("/scan", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });

            const data = await response.json();
            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
            document.getElementById("result-card").style.display = "block";
        } catch (err) {
            alert("Scan Error: " + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Initialize Security Scan";
        }
    };
</script>
</body>
</html>
