<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<!-- Background Shield -->
<div class="bg-shield">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Shield base -->
    <path d="M256 32L96 96v144c0 112 80 192 160 224 80-32 160-112 160-224V96L256 32z"
          fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Glowing cracks -->
    <path d="M256 50 L260 120 L245 135" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <path d="M200 100 L215 160" stroke="#60a5fa" stroke-width="1.2" opacity="0.3"/>
    <path d="M312 120 L302 190" stroke="#3b82f6" stroke-width="1.2" opacity="0.3"/>
    
    <defs>
      <!-- Shield fill gradient -->
      <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0f172a"/>
        <stop offset="100%" stop-color="#1e293b"/>
      </linearGradient>

      <!-- Shield border gradient -->
      <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#60a5fa"/>
      </linearGradient>

      <!-- Glow filter -->
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>
</div>

<div class="auth-container">
  <div class="auth-card">

    <h1 class="logo">Secure Code Scanner</h1>
    <p class="subtitle">Create your account</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" onsubmit="return validateForm()">

      <div class="input-group">
        <input 
          type="email" 
          id="email" 
          name="email" 
          required 
          placeholder="Email"
          oninput="validateEmail()"
        >
        <small id="email-msg"></small>
      </div>

      <div class="input-group">
        <input 
          type="email" 
          id="confirm-email" 
          name="confirm_email" 
          required 
          placeholder="Confirm Email"
          oninput="validateConfirmEmail()"
        >
        <small id="confirm-msg"></small>
      </div>

      <div class="input-group">
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          placeholder="Create Password"
        >
        <small id="pass-msg"></small>
      </div>

      <button class="btn-primary" type="submit">Create Account</button>
    </form>

    <p class="switch">
      Already have an account? 
      <a href="/login">Sign in</a>
    </p>

  </div>
</div>

<script>
function validateEmail() {
  const email = document.getElementById("email").value;
  const msg = document.getElementById("email-msg");
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (email.length === 0) {
    msg.innerText = "";
  } else if (regex.test(email)) {
    msg.innerText = "Valid email";
    msg.style.color = "green";
  } else {
    msg.innerText = "Invalid email";
    msg.style.color = "red";
  }
}

function validateConfirmEmail() {
  const email = document.getElementById("email").value;
  const confirm = document.getElementById("confirm-email").value;
  const msg = document.getElementById("confirm-msg");

  if (confirm.length === 0) {
    msg.innerText = "";
  } else if (email === confirm) {
    msg.innerText = "Emails match";
    msg.style.color = "green";
  } else {
    msg.innerText = "Emails do not match";
    msg.style.color = "red";
  }
}

function validatePassword() {
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("pass-msg");
  const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

  if (!strong.test(pass)) {
    msg.innerText = "Password must be 8+ chars with upper, lower, number, symbol";
    msg.style.color = "red";
    return false;
  }

  msg.innerText = "";
  return true;
}

function validateForm() {
  const emailValid = document.getElementById("email-msg").style.color === "green";
  const confirmValid = document.getElementById("confirm-msg").style.color === "green";
  const passwordValid = validatePassword();

  if (!emailValid || !confirmValid || !passwordValid) {
    return false;
  }
  return true;
}
</script>

</body>
</html>
