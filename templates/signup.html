<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<!-- Background Shield -->
<div class="bg-shield">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <path d="M256 32L96 96v144c0 112 80 192 160 224 80-32 160-112 160-224V96L256 32z"
          fill="url(#grad)" opacity="0.15"/>
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#60a5fa"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<div class="auth-container">
  <div class="auth-card">

    <h1 class="logo">SecureScan</h1>
    <p class="subtitle">Create your account</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" onsubmit="return validatePassword()">

      <div class="input-group">
        <input 
          type="email" 
          id="email" 
          name="email" 
          required 
          placeholder="Email"
          oninput="validateEmail()"
        >
        <small id="email-msg"></small>
      </div>

      <div class="input-group">
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          placeholder="Password"
        >
        <small id="pass-msg"></small>
      </div>

      <button class="btn-primary" type="submit">Create Account</button>
    </form>

    <p class="switch">
      Already have an account? 
      <a href="/login">Sign in</a>
    </p>

  </div>
</div>

<script>
function validateEmail() {
  const email = document.getElementById("email").value;
  const msg = document.getElementById("email-msg");

  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (email.length === 0) {
    msg.innerText = "";
  } else if (regex.test(email)) {
    msg.innerText = "Valid email";
    msg.style.color = "green";
  } else {
    msg.innerText = "Invalid email";
    msg.style.color = "red";
  }
}

function validatePassword() {
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("pass-msg");

  const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

  if (!strong.test(pass)) {
    msg.innerText = "Password must be 8+ chars with upper, lower, number, symbol";
    msg.style.color = "red";
    return false;
  }

  msg.innerText = "";
  return true;
}
</script>

</body>
</html>
