<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<div class="bg-shield">
  <svg viewBox="0 0 512 512">
    <path d="M256 32L96 96v144c0 112 80 192 160 224 80-32 160-112 160-224V96L256 32z"
          fill="#0f172a" stroke="#3b82f6" stroke-width="6"/>
  </svg>
</div>

<div class="auth-container">
  <div class="auth-card">

    <h1 class="logo">Secure Code Scanner</h1>
    <p class="subtitle">Create your account</p>

    <form id="signupForm">

      <div class="input-group">
        <input type="email" id="email" required placeholder="Email">
      </div>

      <div class="input-group">
        <input type="email" id="confirm-email" required placeholder="Confirm Email">
      </div>

      <div class="input-group">
        <input type="password" id="password" required placeholder="Create Password">
      </div>

      <button class="btn-primary" type="submit">Create Account</button>
    </form>

    <p class="switch">
      Already have an account? 
      <a href="/login">Sign in</a>
    </p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const confirm = document.getElementById("confirm-email").value;
  const password = document.getElementById("password").value;

  if (email !== confirm) {
    alert("Emails do not match");
    return;
  }

  try {
    await auth.createUserWithEmailAndPassword(email, password);
    alert("Account created. Please login.");
    window.location.href = "/login";
  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>
