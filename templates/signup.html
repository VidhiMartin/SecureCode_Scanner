<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Secure Code Scanner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form id="signupForm" style="display:flex; flex-direction:column; max-width:400px; margin:auto; padding:50px;">
            <h1>Sign Up</h1>
            <input type="email" id="email" placeholder="Email" required style="margin-bottom:10px; padding:10px;">
            <input type="password" id="password" placeholder="Password" required style="margin-bottom:10px; padding:10px;">
            <button type="submit" id="submitBtn" style="padding:10px; background:blue; color:white;">Create Account</button>
            <p><a href="/login">Already have an account? Login</a></p>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
            authDomain: "code-scanner-91d48.firebaseapp.com",
            projectId: "code-scanner-91d48"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.tenantId = "Enterprise-Test-avvoo";

        document.getElementById("signupForm").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("submitBtn");

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                alert("Account created successfully!");
                window.location.href = "/login";
            } catch (err) {
                alert("Signup Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Create Account";
            }
        };
    </script>
</body>
</html>
