<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<!-- 🔵 GLOWING SHIELD BACKGROUND -->
<div class="bg-shield">
  <svg viewBox="0 0 512 512">
    <path d="M256 32L96 96v144c0 112 80 192 160 224 80-32 160-112 160-224V96L256 32z"
          fill="#020617" stroke="#0ea5e9" stroke-width="5" filter="url(#outerGlow)"/>

    <path d="M256 80L140 120v120c0 90 60 150 116 180 56-30 116-90 116-180V120L256 80z"
          fill="#38bdf8" opacity="0.2"/>

    <path d="M260 60 L245 150 L270 190" stroke="#38bdf8" stroke-width="2" filter="url(#crackGlow)"/>
    <path d="M210 120 L240 210" stroke="#0ea5e9" stroke-width="2" filter="url(#crackGlow)"/>
    <path d="M310 130 L290 240" stroke="#38bdf8" stroke-width="2" filter="url(#crackGlow)"/>

    <defs>
      <filter id="outerGlow">
        <feGaussianBlur stdDeviation="10"/>
      </filter>
      <filter id="crackGlow">
        <feGaussianBlur stdDeviation="4"/>
      </filter>
    </defs>
  </svg>
</div>

<div class="auth-container">
  <div class="auth-card">

    <h1 class="logo">Secure Code Scanner</h1>
    <p class="subtitle">Create your account</p>

    <form id="signupForm">
      <input type="email" id="email" required placeholder="Email">
      <input type="email" id="confirm-email" required placeholder="Confirm Email">
      <input type="password" id="password" required placeholder="Password">
      <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
  authDomain: "code-scanner-91d48.firebaseapp.com",
  projectId: "code-scanner-91d48"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const confirm = document.getElementById("confirm-email").value;
  const password = document.getElementById("password").value;

  if (email !== confirm) {
    alert("Emails do not match");
    return;
  }

  try {
    await auth.createUserWithEmailAndPassword(email, password);
    alert("Account created. Please login.");
    window.location.href = "/login";
  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>
