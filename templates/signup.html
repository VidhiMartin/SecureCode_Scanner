<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Secure Code Scanner</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <h1 class="logo">Secure Code Scanner</h1>
      <p class="subtitle">Create a new secure operative identity</p>
    </div>

    <form id="signupForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" required placeholder="Email Address">
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" required placeholder="Create Password">
      </div>

      <div class="input-group">
        <i class="fas fa-check-double"></i>
        <input type="password" id="confirm-password" required placeholder="Confirm Password">
      </div>

      <button class="btn-primary" type="submit" id="submitBtn">
        <i class="fas fa-user-shield"></i> Initialize Account
      </button>
    </form>

    <div class="auth-footer">
      <p>Existing operative? <a href="/login">Access Vault</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
  authDomain: "code-scanner-91d48.firebaseapp.com",
  projectId: "code-scanner-91d48"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm-password").value;

  if (password !== confirm) {
    alert("Encryption mismatch: Passwords do not match.");
    return;
  }

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  btn.disabled = true;

  try {
    await auth.createUserWithEmailAndPassword(email, password);
    alert("Identity Created. Please log in to synchronize.");
    window.location.href = "/login";
  } catch (err) {
    alert("Registration Failed: " + err.message);
    btn.innerHTML = '<i class="fas fa-user-shield"></i> Initialize Account';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
