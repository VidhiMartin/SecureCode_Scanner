<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Secure Code Scanner</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #mfa-modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(10,10,10,0.95); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(10px);
        }
        .mfa-card {
            background:#1a1a1a; padding:40px; border-radius:15px; border:1px solid #00ff88;
            text-align:center; max-width:400px; width:90%;
        }
        #qr-code-img { border: 10px solid white; border-radius: 10px; margin: 20px 0; width: 200px; }
        .mfa-input { 
            width:100%; background:rgba(255,255,255,0.05); border:1px solid #333; 
            color:white; padding:12px; margin-bottom:20px; text-align:center; font-size:1.5rem; letter-spacing:5px;
        }
    </style>
</head>
<body class="auth-body">

<div id="mfa-modal">
    <div class="mfa-card">
        <h2 style="color:#00ff88;"><i class="fas fa-qrcode"></i> Link Authenticator</h2>
        <p style="font-size:0.9rem; color:#aaa;">Scan this code with Google Authenticator or Authy to enable 2FA.</p>
        <img id="qr-code-img" src="" alt="QR Setup">
        <input type="text" id="mfa-code" class="mfa-input" placeholder="000000" maxlength="6">
        <button class="btn-primary" onclick="verifyAndComplete()">Verify & Initialize</button>
    </div>
</div>

<div class="auth-container" id="main-signup">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
            <h1 class="logo">Secure Code Scanner</h1>
            <p class="subtitle">Create a new secure operative identity</p>
        </div>

        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" required placeholder="Email Address">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" required placeholder="Create Password">
            </div>
            <div class="input-group">
                <i class="fas fa-check-double"></i>
                <input type="password" id="confirm-password" required placeholder="Confirm Password">
            </div>
            <button class="btn-primary" type="submit" id="submitBtn">
                <i class="fas fa-user-shield"></i> Initialize Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Existing operative? <a href="/login">Access Vault</a></p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD9llGi3Rq4eTgOA4QLI2hGK00v-jx0bCs",
    authDomain: "code-scanner-91d48.firebaseapp.com",
    projectId: "code-scanner-91d48"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
auth.tenantId = "Enterprise-Test-avvoo";

let pendingEmail = "";

document.getElementById("signupForm").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPass = document.getElementById("confirm-password").value;

    if (password !== confirmPass) { alert("Encryption mismatch!"); return; }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    btn.disabled = true;

    try {
        await auth.createUserWithEmailAndPassword(email, password);
        pendingEmail = email;
        
        // Trigger Backend MFA Setup
        const res = await fetch('/mfa/setup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email })
        });
        const data = await res.json();
        
        document.getElementById('qr-code-img').src = `data:image/png;base64,${data.qr_code}`;
        document.getElementById('main-signup').style.display = 'none';
        document.getElementById('mfa-modal').style.display = 'flex';

    } catch (err) {
        alert("Registration Failed: " + err.message);
        btn.innerHTML = '<i class="fas fa-user-shield"></i> Initialize Account';
        btn.disabled = false;
    }
};

async function verifyAndComplete() {
    const code = document.getElementById('mfa-code').value;
    const res = await fetch('/mfa/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: pendingEmail, code: code })
    });
    const data = await res.json();

    if (data.success) {
        const token = await auth.currentUser.getIdToken(true);
        localStorage.setItem("token", token);
        window.location.href = "/scanner";
    } else {
        alert("Verification failed. Check your app code.");
    }
}
</script>
</body>
</html>
